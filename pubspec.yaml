name: quizhub
description: "A new Flutter project."

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_dotenv: ^5.1.0
  shared_preferences: ^2.1.1
  http: ^1.1.0
  provider: ^6.0.5
  flutter_secure_storage: ^9.0.0
  cupertino_icons: ^1.0.8
  flutter_stripe: 12.4.0
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  fpdart: ^1.2.0
  internet_connection_checker_plus: ^2.9.1+2
  dio: ^5.9.2
  get_it: ^9.2.1
  dio_cookie_manager: ^3.4.0
  cookie_jar: ^4.0.9
  ionicons: ^0.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/icon/app_icon.png

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/icon/app_icon.png
